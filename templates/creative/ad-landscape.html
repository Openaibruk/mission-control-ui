<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200, height=628">
    <title>Ad Creative - Landscape</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 1200px;
            height: 628px;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(90deg, #0A0E1A 60%, #0066FF 100%);
            display: flex;
            align-items: center;
            padding: 64px;
        }
        
        .text-side {
            flex: 1;
            padding-right: 48px;
        }
        
        .logo {
            font-size: 20px;
            font-weight: 700;
            color: #00D4FF;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .logo-icon {
            width: 24px;
            height: 24px;
            background: #0066FF;
            border-radius: 6px;
        }
        
        .headline {
            font-size: 48px;
            font-weight: 700;
            color: #FFFFFF;
            line-height: 1.15;
            margin-bottom: 16px;
        }
        
        .subhead {
            font-size: 20px;
            font-weight: 400;
            color: rgba(255,255,255,0.8);
            margin-bottom: 32px;
        }
        
        .cta {
            display: inline-block;
            background: #00D4FF;
            color: #0A0E1A;
            padding: 16px 40px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 8px;
            text-decoration: none;
        }
        
        .image-side {
            width: 400px;
            height: 400px;
            background: linear-gradient(135deg, #1A2744 0%, #0A0E1A 100%);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid rgba(0,212,255,0.3);
        }
        
        .image-placeholder {
            font-size: 120px;
        }
    </style>
</head>
<body>
    <div class="text-side">
        <div class="logo">
            <div class="logo-icon"></div>
            OpenClaw
        </div>
        <div class="headline">Your AI Assistant, Evolved.</div>
        <div class="subhead">Stop chatting. Start accomplishing.</div>
        <a href="#" class="cta">Get Started Free →</a>
    </div>
    
    <div class="image-side">
        <span class="image-placeholder">⚡</span>
    </div>
</body>
</html>
