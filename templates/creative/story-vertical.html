<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, height=1920">
    <title>Story - Vertical</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 1080px;
            height: 1920px;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(180deg, #0A0E1A 0%, #0066FF 100%);
            display: flex;
            flex-direction: column;
            padding: 80px 48px;
        }
        
        .logo {
            font-size: 28px;
            font-weight: 700;
            color: #00D4FF;
            text-align: center;
        }
        
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding-bottom: 250px;
        }
        
        .headline {
            font-size: 72px;
            font-weight: 700;
            color: #FFFFFF;
            line-height: 1.1;
            text-align: center;
            margin-bottom: 32px;
        }
        
        .subhead {
            font-size: 32px;
            font-weight: 400;
            color: rgba(255,255,255,0.9);
            text-align: center;
            max-width: 800px;
            margin: 0 auto;
        }
        
        .cta {
            display: block;
            width: fit-content;
            margin: 48px auto 0;
            background: #00D4FF;
            color: #0A0E1A;
            padding: 20px 56px;
            font-size: 24px;
            font-weight: 600;
            border-radius: 8px;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="logo">⚡ OpenClaw</div>
    
    <div class="content">
        <div class="headline">Your AI Assistant, Evolved.</div>
        <div class="subhead">Stop chatting. Start accomplishing. The AI that actually gets stuff done.</div>
        <a href="#" class="cta">Try Free →</a>
    </div>
</body>
</html>
